<app-navbar (sidebarToggle)="sidebarOpen = !sidebarOpen"></app-navbar>
<app-toast-container></app-toast-container>

<div class="em-layout" [class.sidebar-visible]="isLoggedIn()" [class.sidebar-collapsed]="!sidebarOpen">

  @if (isLoggedIn()) {
  <app-sidebar [isOpen]="sidebarOpen" (closeSidebar)="sidebarOpen = false">
  </app-sidebar>
  }

  <main class="em-main-content">
    <router-outlet></router-outlet>
  </main>

</div>
