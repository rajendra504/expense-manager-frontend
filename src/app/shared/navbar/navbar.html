<nav class="em-topbar">
  <!-- Hamburger — mobile only -->
  <button class="em-topbar-hamburger d-lg-none" (click)="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <!-- Brand -->
  <span class="em-topbar-brand em-title">
    <i class="bi bi-hexagon-fill me-2" style="color: var(--gold); font-size: 14px;"></i>
    Expense Tracker
  </span>

  <!-- Right side -->
  <div class="em-topbar-right ms-auto d-flex align-items-center gap-3">
    @if (isLoggedIn()) {
    <!-- User avatar -->
    <div class="em-topbar-avatar" [title]="userEmail()">
      {{ userInitial() }}
    </div>
    <!-- Logout -->
    <button class="btn btn-outline-danger-em btn-sm px-3" (click)="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>
      <span class="d-none d-md-inline">Logout</span>
    </button>
    } @else {
    <a routerLink="/login" class="btn btn-outline-secondary btn-sm px-3">
      <i class="bi bi-box-arrow-in-right me-1"></i> Login
    </a>
    <a routerLink="/register" class="btn btn-primary btn-sm px-3">
      <i class="bi bi-person-plus me-1"></i> Register
    </a>
    }
  </div>
</nav>
